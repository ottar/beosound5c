name: Python unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/python -v --tb=short

      - name: Run lint baseline (grep-lint ratchet)
        if: always()
        run: |
          python -m pytest tests/unit/python/test_lint_baseline.py -v

      - name: Run cross-source import + service import-order tests
        if: always()
        run: |
          python -m pytest \
            tests/unit/python/test_cross_source_import.py \
            tests/unit/python/test_service_import_order.py \
            -v
