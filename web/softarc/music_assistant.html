<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music - Beosound 5c</title>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="../assets/favicons/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicons/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="../assets/favicons/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="../assets/favicons/android-chrome-512x512.png">
    <link rel="manifest" href="../assets/favicons/site.webmanifest">
    <meta name="theme-color" content="#000000">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../assets/phosphor/phosphor.css">
</head>
<body>
    <div id="app">
        <div class="counter">
            <div id="counter-path"></div>
            <span id="current-item">1</span> / <span id="total-items">0</span>
        </div>
        <div class="hierarchy-depth-1" id="hierarchy-background"></div>
        <div class="arc-container" id="arc-container"></div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/arc-utils.js"></script>
    <script src="../js/emulator-bridge.js"></script>
    <script src="script-v2.js"></script>
    <script>
        const MA_URL = (typeof AppConfig !== 'undefined' && AppConfig.musicAssistantServiceUrl)
            ? AppConfig.musicAssistantServiceUrl
            : 'http://localhost:8780';

        async function fetchBrowse(path) {
            const resp = await fetch(`${MA_URL}/browse?path=${encodeURIComponent(path)}`);
            if (!resp.ok) throw new Error(`Browse failed: ${resp.status}`);
            return resp.json();
        }

        /** Map MA browse items to ArcList items with proper icons/artwork. */
        function mapMaItem(item) {
            // Discover section title — a non-selectable header row.
            if (item.type === 'header') {
                return {
                    id: item.id || `hdr-${item.name}`,
                    name: item.name,
                    _maType: 'header',
                    header: true,       // styled distinctly by script-v2/CSS
                    actionable: false,  // GO does nothing on a header
                };
            }
            const mapped = {
                id: item.path || item.uri || item.id || item.name,
                name: item.name,
                _maPath: item.path,
                _maType: item.type,
                _maUri: item.uri,
                _maParentUri: item.parent_uri,
                _maRadio: item.radio,
                _maImage: item.image,
                // Context-menu (hold-GO) metadata, defaulted safely — Discover
                // items may omit these.
                _maMediaType: item.media_type || '',
                _maProvider: item.provider || 'library',
                _maFavorite: !!item.favorite,
                _maInLibrary: item.in_library !== undefined
                    ? !!item.in_library : (item.provider || 'library') === 'library',
                _maArtistUri: item.artist_uri || '',
                _maAlbumUri: item.album_uri || '',
            };

            if (item.image) {
                mapped.image = item.image;
            } else if (item.type === 'category') {
                mapped.icon = item.icon || 'folder';
                mapped.color = item.color || '#F9CA24';
            } else {
                mapped.icon = item.radio ? 'radio' : 'music-note';
                mapped.color = '#74B9FF';
            }
            if (item.subtitle) mapped.subtitle = item.subtitle;
            // Discover rows opt into a small cover shown left of the text
            // (other MUSIC lists stay text-only like the original).
            if (item.cover) mapped.cover = true;

            return mapped;
        }

        /** Check if an item is a container that can be drilled into. */
        function isContainer(item) {
            return item._maType === 'category';
        }

        /** Send a command to the Music Assistant source service. Returns the
         *  parsed JSON response (or an {status:'error'} shape) so callers can
         *  react — the favorite/library toggles gate their optimistic flip on
         *  a non-error status. */
        async function sendMaCommand(command, params = {}) {
            try {
                const resp = await fetch(`${MA_URL}/command`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command, ...params }),
                });
                return await resp.json();
            } catch (e) {
                console.error(`[MusicAssistant] ${command} failed:`, e.message);
                return { status: 'error', message: e.message };
            }
        }

        /** Fetch a browse level by full MA URI and swap it into the open
         *  context menu as a real browse level (Go to artist/album). */
        async function gotoUri(uri, arcList) {
            if (!uri || !arcList) return;
            try {
                const data = await fetchBrowse('uri/' + uri);
                arcList.replaceContextMenuLevel((data.items || []).map(mapMaItem));
            } catch (e) {
                console.error('[MusicAssistant] goto failed:', e.message);
            }
        }

        /** Build the hold-GO action list for a highlighted MA row. Returns null
         *  for headers / rows without a URI (menu declines). Cancel is always
         *  index 0 so releasing without scrolling is a no-op. The action matrix
         *  is keyed off the item's media type (works for non-library Discover
         *  items too). Runners mutate _maFavorite/_maInLibrary on the shared
         *  item reference so a reopened menu shows the flipped label. */
        function contextMenuBuilder(item) {
            if (!item || item._maType === 'header' || !item._maUri) return null;

            const mt = item._maMediaType
                || (item._maRadio ? 'radio'
                    : (item._maType === 'category' ? '' : 'track'));
            const isTrack = mt === 'track';
            const isAlbum = mt === 'album';
            const isPlaylist = mt === 'playlist';
            const isArtist = mt === 'artist';
            const isRadio = mt === 'radio';
            const enqueueable = isTrack || isAlbum || isPlaylist;

            const base = () => ({
                uri: item._maUri,
                parent_uri: item._maParentUri || '',
                name: item.name,
                artist: item.subtitle || '',
                image: item._maImage || '',
                radio: !!item._maRadio,
            });
            const play = (extra) => sendMaCommand('play_item', { ...base(), ...extra });
            const itemId = () => (item._maUri || '').split('/').pop();

            const actions = [
                { id: 'cancel', name: 'Cancel', icon: 'x-circle',
                  color: '#B2BEC3', run: () => {} },
            ];

            if (enqueueable) {
                actions.push({ id: 'play', name: 'Play now', icon: 'play',
                    color: '#00B894', run: () => play({ option: 'play' }) });
                actions.push({ id: 'next', name: 'Play next', icon: 'arrow-line-right',
                    color: '#00CEC9', run: () => play({ option: 'next' }) });
                actions.push({ id: 'add', name: 'Add to queue', icon: 'plus',
                    color: '#74B9FF', run: () => play({ option: 'add' }) });
            }

            // Play from here — today's GO payload (replace + parent + start_item).
            // Containers/artists/radio play the whole thing ("Play").
            actions.push({
                id: 'replace',
                name: (isArtist || isRadio) ? 'Play' : 'Play from here',
                icon: 'play-circle', color: '#0984E3',
                run: () => play({ option: 'replace' }),
            });

            if (isTrack || isAlbum || isArtist) {
                actions.push({ id: 'radio', name: 'Start radio', icon: 'broadcast',
                    color: '#FF6B6B',
                    run: () => play({ radio_mode: true, parent_uri: '' }) });
            }

            // Shuffle: replaces the queue with the whole container (same as
            // "Play"/"Play from here") and turns queue shuffle on. Only
            // meaningful for multi-track containers, not single tracks/radio.
            if (isAlbum || isPlaylist || isArtist) {
                actions.push({ id: 'shuffle', name: 'Shuffle play', icon: 'shuffle',
                    color: '#FDCB6E',
                    run: () => play({ option: 'replace', shuffle: true }) });
            }

            if ((isTrack || isAlbum) && item._maArtistUri) {
                actions.push({ id: 'goto_artist', name: 'Go to artist',
                    icon: 'microphone-stage', color: '#FD79A8',
                    run: (acted, arc) => gotoUri(item._maArtistUri, arc) });
            }
            if (isTrack && item._maAlbumUri) {
                actions.push({ id: 'goto_album', name: 'Go to album',
                    icon: 'vinyl-record', color: '#A29BFE',
                    run: (acted, arc) => gotoUri(item._maAlbumUri, arc) });
            }

            const favAdd = !item._maFavorite;
            actions.push({
                id: 'favorite',
                name: favAdd ? 'Add favorite' : 'Remove favorite',
                icon: favAdd ? 'heart' : 'heart-break', color: '#E84393',
                run: async () => {
                    const r = await sendMaCommand('favorite', {
                        uri: item._maUri, media_type: mt,
                        item_id: itemId(), add: favAdd });
                    if (r && r.status !== 'error') item._maFavorite = favAdd;
                },
            });

            const libAdd = !item._maInLibrary;
            actions.push({
                id: 'library',
                name: libAdd ? 'Add to library' : 'Remove from library',
                icon: libAdd ? 'plus-square' : 'minus-square', color: '#55EFC4',
                run: async () => {
                    const r = await sendMaCommand('library', {
                        uri: item._maUri, media_type: mt,
                        item_id: itemId(), add: libAdd });
                    if (r && r.status !== 'error') item._maInLibrary = libAdd;
                },
            });

            return actions;
        }

        // Which MA category the arc-list shows as its root. Driven by the
        // left main-menu (DISCOVER / ARTISTS / ALBUMS / …) via 'open-path'
        // messages — the categories used to be the arc-list's own root list,
        // but on BeoSound 5 the views live in the left Arc, so each left-menu
        // entry sets this section and the list shows that category directly.
        //
        // Seeded from localStorage (shared with the parent page — same
        // origin): re-parenting the preloaded iframe on navigation reloads
        // this document, losing any in-flight 'open-path' postMessage. The
        // parent writes the section to localStorage *before* messaging, so a
        // freshly (re)loaded iframe always boots into the right category.
        const SECTION_KEY = 'ma_current_section';
        let currentSection = localStorage.getItem(SECTION_KEY) || 'discover';

        document.addEventListener('DOMContentLoaded', () => {
            const arcList = new ArcList({
                rootLoader: async () => {
                    const data = await fetchBrowse(currentSection);
                    return data.items.map(mapMaItem);
                },
                childrenLoader: async (item) => {
                    if (!isContainer(item)) return null;
                    const data = await fetchBrowse(item._maPath || '');
                    return data.items.map(mapMaItem);
                },
                levels: [{
                    isContainer,
                }],
                // Per-section state key — each category remembers its own
                // scroll/drill position, and a reload into a different
                // section can't restore another section's saved position.
                storagePrefix: `music_assistant_arclist_${currentSection}`,
                context: 'music_assistant',
                webhookUrl: typeof AppConfig !== 'undefined' ? AppConfig.webhookUrl : null,
                contextMenuBuilder,
                onGo: async (item) => {
                    if (item._maType === 'header') {
                        return;  // section title — not actionable
                    }
                    if (item._maType === 'track') {
                        await sendMaCommand('play_item', {
                            uri: item._maUri,
                            parent_uri: item._maParentUri || '',
                            name: item.name,
                            artist: item.subtitle || '',
                            image: item._maImage || '',
                            radio: !!item._maRadio,
                        });
                        return;
                    }
                    // Container (artist / album / playlist): GO PLAYS the whole
                    // thing — matches BeoSound 5, where GO plays and ‹ (left)
                    // unfolds. Drilling in to pick a specific album/track is the
                    // ‹ button (ArcList.handleButton('left') -> drillDown).
                    if (item._maUri) {
                        await sendMaCommand('play_item', {
                            uri: item._maUri,
                            parent_uri: '',
                            name: item.name,
                            artist: item.subtitle || '',
                            image: item._maImage || '',
                            radio: false,
                        });
                    } else {
                        arcList.drillDown();  // nothing to play — fall back to drill
                    }
                },
            });
            window.arcListInstance = arcList;
        });

        // Left-menu category selection: the parent posts { type:'open-path',
        // path:'artists' } when a MUSIC view is picked. Switch the root section
        // and reset the list to that category's top level. Retries from the
        // parent cover the case where this arrives before the ArcList exists —
        // init()'s rootLoader then just reads the updated currentSection.
        window.addEventListener('message', (e) => {
            if (e.data?.type !== 'open-path') return;
            const section = e.data.path || 'discover';
            const inst = window.arcListInstance;
            if (section === currentSection && inst && inst.depth === 0) return;
            currentSection = section;
            try { localStorage.setItem(SECTION_KEY, section); } catch (err) {}
            if (inst) {
                inst.config.storagePrefix = `music_assistant_arclist_${section}`;
                if (inst.jumpToRoot) inst.jumpToRoot();
            }
        });
    </script>
</body>
</html>
