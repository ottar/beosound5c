// Sources we let the user pick as the N.MUSIC / N.RADIO feed when the
// BS5c is acting as a SourceCenter for another audio master.  Restricted
// to keys that produce a continuous music stream.
const ML_PROVIDER_SOURCE_KEYS = ['SPOTIFY','TIDAL','APPLE MUSIC','PLEX','RADIO','NEWS','USB','CD'];

// Sources we expose in the LINK view when the BS5c is a link room and
// the audio master lives elsewhere (e.g. BS9000).  Beo4 source keys that
// a typical ML audio master can serve.
const ML_LINK_SOURCE_OPTIONS = [
    { value: 'radio',   label: 'Radio' },
    { value: 'cd',      label: 'CD' },
    { value: 'amem',    label: 'A.MEM (tape)' },
    { value: 'a.aux',   label: 'A.Aux' },
    { value: 'n.radio', label: 'N.Radio' },
    { value: 'n.music', label: 'N.Music' },
];

function renderMasterlink(cfg) {
    const ml = cfg.masterlink || {};
    const role = ml.role || 'master';
    const ir = ml.ir || {};
    const audioIr = ir.audio !== false;
    const videoIr = ir.video !== false;
    const prov = ml.provider || {};
    const link = ml.link || {};
    const linkSources = Array.isArray(link.sources) ? link.sources : [];
    const enabledMenu = cfg.menu || {};

    const providerKeys = ML_PROVIDER_SOURCE_KEYS.filter(k => k in enabledMenu);
    const buildProviderOpts = (selected) => {
        const sel = selected || '';
        // Keep an out-of-list saved value visible so a Source-disabled-then-saved
        // round trip doesn't silently lose it.
        const allKeys = sel && !providerKeys.includes(sel) ? [sel, ...providerKeys] : providerKeys;
        return ['<option value=""' + (sel===''?' selected':'') + '>— none —</option>']
            .concat(allKeys.map(k =>
                `<option value="${esc(k)}"${k===sel?' selected':''}>${esc(k)}</option>`))
            .join('');
    };

    const linkChecks = ML_LINK_SOURCE_OPTIONS.map(s =>
        `<label class="cfg-link-src" style="display:flex;align-items:center;gap:8px;font-weight:400;cursor:pointer">
            <input type="checkbox" class="cfg-ml-link-src" value="${s.value}" ${linkSources.includes(s.value)?'checked':''}>
            ${esc(s.label)}
        </label>`).join('');

    return `<div class="cfg-card">
        <h2>Master Link</h2>
        <label for="cfg-ml-role">Role</label>
        <select id="cfg-ml-role">
            <option value="master"   ${role==='master'?'selected':''}>Audio master (default)</option>
            <option value="provider" ${role==='provider'?'selected':''}>N.MUSIC / N.RADIO provider</option>
            <option value="link"     ${role==='link'?'selected':''}>Link room</option>
        </select>

        <div id="cfg-ml-provider-cond" class="cfg-cond${role==='provider'?' show':''}">
            <label for="cfg-ml-nmusic">Source for N.MUSIC</label>
            <select id="cfg-ml-nmusic">${buildProviderOpts(prov.nmusic_source)}</select>
            <label for="cfg-ml-nradio">Source for N.RADIO</label>
            <select id="cfg-ml-nradio">${buildProviderOpts(prov.nradio_source)}</select>
            <div class="hint">Only sources enabled above appear here. Selecting a source means: when another audio master (BS9000, BC2, …) requests N.MUSIC or N.RADIO on the bus, this BS5c streams that source's audio plus its track metadata.</div>
        </div>

        <div id="cfg-ml-link-cond" class="cfg-cond${role==='link'?' show':''}">
            <label>Sources from master</label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;margin:4px 0 8px">
                ${linkChecks}
            </div>
            <div class="hint">A LINK page in the main menu (TBD) will show whichever of these the master currently provides, plus its track metadata.</div>
        </div>

        <div style="margin-top:18px; padding-top:14px; border-top:1px solid #1a1a1a">
            <div style="font-size:11px; font-weight:600; color:#666; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:12px">IR filtering</div>
            <div style="display:flex;gap:24px">
                <label style="display:flex;align-items:center;gap:8px;margin:0;font-weight:400;cursor:pointer">
                    <input id="cfg-ml-ir-audio" type="checkbox" ${audioIr?'checked':''}>
                    Listen to audio IR commands
                </label>
                <label style="display:flex;align-items:center;gap:8px;margin:0;font-weight:400;cursor:pointer">
                    <input id="cfg-ml-ir-video" type="checkbox" ${videoIr?'checked':''}>
                    Listen to video IR commands
                </label>
            </div>
            <label style="display:flex;align-items:center;gap:8px;margin:12px 0 0;font-weight:400;cursor:pointer">
                <input id="cfg-remote-handle-all" type="checkbox" ${cfg.remote?.handle_all?'checked':''}>
                Handle all Beo4 device types locally
            </label>
            <div class="hint">Off: only device types matching the configured source buttons are
            handled here — the rest (typically Video-mode presses) forward to Home Assistant /
            MQTT. On: everything is handled locally and nothing falls through.</div>
        </div>

        <div class="hint" style="margin-top:14px">Audio over Master Link physically rides the bus only when the Volume output is PowerLink. With Sonos/BlueSound players the BS5c can still exchange control telegrams (source requests, IR forwarding, track metadata) but cannot bridge audio onto the ML bus.</div>
    </div>`;
}

function renderSources(cfg) {
    const menu = cfg.menu || {};
    const usedIr = {};
    CFG_SOURCE_DEFS.forEach(src => {
        if (!src.fields) return;
        const kn = src.key.replace(/ /g,'_').toLowerCase();
        const irField = src.fields.find(f => f.isIr);
        if (irField) { const val = cfgGet(cfg, irField.path) || ''; if (val) usedIr[val] = kn; }
    });

    const rows = CFG_SOURCE_DEFS.map(src => {
        const kn = src.key.replace(/ /g,'_').toLowerCase();
        const enabled = src.fixed || (src.key in menu);
        const hasFields = !!(src.fields && src.fields.length)
            || !!(src.checksFields && src.checksFields.length)
            || !!(src.boolFields && src.boolFields.length);

        const checkHtml = src.fixed
            ? `<input type="checkbox" checked disabled>`
            : `<input type="checkbox" id="cfg-src-${kn}-toggle" class="cfg-src-toggle" data-key="${src.key}" ${enabled?'checked':''}>`;

        const authHtml = src.authPort
            ? `<a class="cfg-auth-link" href="${src.authScheme||'http'}://${location.hostname}:${src.authPort}/setup" target="_blank">Authenticate →</a>`
            : '';

        const infoBlock = src.infoHtml ? `<div class="cfg-instructions">${src.infoHtml}</div>` : '';
        const hintHtml = (!hasFields && src.hint) ? `<div style="margin:2px 0 4px 30px;font-size:12px;color:#444">${src.hint}</div>` : '';
        // Boolean toggles (e.g. MUSIC's submenu mode) — plain checkboxes
        // bound to a config path.
        const boolsHtml = (src.boolFields || []).map(f =>
            `<label style="display:flex;align-items:center;gap:8px;font-weight:400;cursor:pointer">
             <input type="checkbox" id="cfg-src-${kn}-${f.fid}" ${cfgGet(cfg, f.path) ? 'checked' : ''}> ${f.label}</label>
             ${f.hint ? `<div class="hint">${f.hint}</div>` : ''}`
        ).join('');

        // Multi-checkbox fields (e.g. MUSIC's library views / Discover rows):
        // current config array selects; absent/empty = all options checked.
        const checksHtml = (src.checksFields || []).map(cf => {
            const cur = cfgGet(cfg, cf.path);
            const on = new Set(Array.isArray(cur) && cur.length ? cur : cf.options.map(o => o[0]));
            return `<label>${cf.label}</label>` + cf.options.map(([v, l]) =>
                `<label style="display:flex;align-items:center;gap:8px;font-weight:400;cursor:pointer">
                 <input type="checkbox" class="cfg-checks-${kn}-${cf.fid}" value="${v}" ${on.has(v)?'checked':''}> ${l}</label>`
            ).join('');
        }).join('');

        const fieldsHtml = hasFields ? `<div id="cfg-src-${kn}-body" class="sub-section cfg-cond${enabled?' show':''}">
            ${infoBlock}${boolsHtml}${checksHtml}${(src.fields || []).map(f => {
                if (f.isIr) {
                    const currentVal = cfgGet(cfg, f.path) || '';
                    const opts = BEO4_SOURCES.map(s => {
                        const takenBy = usedIr[s.value];
                        const isSelf = takenBy === kn;
                        const isTaken = takenBy && !isSelf;
                        return `<option value="${s.value}" ${s.value===currentVal?'selected':''} ${isTaken?'disabled':''}>${s.label}${isTaken?' (used)':''}</option>`;
                    }).join('');
                    return `<label>IR trigger <span style="color:#333;font-weight:400">(optional)</span></label>
                        <select id="cfg-src-${kn}-${f.fid}" class="cfg-ir-select" data-kn="${kn}">
                            <option value="">— none —</option>${opts}
                        </select>`;
                }
                let val = '';
                if (f.path[0] === '_menu_url') {
                    // URL-type menu entries (SECURITY, WEATHER): the value
                    // lives in menu[KEY].url, not at a config path. f.default
                    // prefills newly-enabled entries so the toggle works
                    // without typing the bundled page path by hand.
                    const entry = menu[src.key];
                    val = typeof entry === 'object' ? esc(entry.url || '') : esc(f.default || '');
                } else {
                    val = esc(cfgGet(cfg, f.path) || '');
                }
                return `<label>${f.label}${f.optional?' <span style="color:#333;font-weight:400">(optional)</span>':''}</label>
                    <input id="cfg-src-${kn}-${f.fid}" type="text" value="${val}" placeholder="${esc(f.placeholder||'')}">
                    ${f.hint ? `<div class="hint">${f.hint}</div>` : ''}`;
            }).join('')}
            ${authHtml}
        </div>` : (authHtml ? `<div id="cfg-src-${kn}-body" class="sub-section cfg-cond${enabled?' show':''}">${authHtml}</div>` : '');

        return `<div class="sec-header">
            ${checkHtml}
            <label for="${src.fixed ? '' : `cfg-src-${kn}-toggle`}">${src.label}</label>
        </div>${hintHtml}${fieldsHtml}`;
    }).join('');

    return `<div class="cfg-card"><h2>Sources</h2><div id="cfg-sources-list">${rows}</div></div>`;
}

// ── Radio favourites: bind buttons (1-9, 0, RED, GREEN, YELLOW, BLUE) ──

const RADIO_BUTTON_SLOTS = [
    { key: '1', label: '1' }, { key: '2', label: '2' },
    { key: '3', label: '3' }, { key: '4', label: '4' },
    { key: '5', label: '5' }, { key: '6', label: '6' },
    { key: '7', label: '7' }, { key: '8', label: '8' },
    { key: '9', label: '9' }, { key: '0', label: '0' },
    { key: 'red',    label: 'RED',    color: true },
    { key: 'green',  label: 'GREEN',  color: true },
    { key: 'yellow', label: 'YELLOW', color: true },
    { key: 'blue',   label: 'BLUE',   color: true },
];

let _radioFavourites = [];      // [{stationuuid, name, favicon, country, ...}]
let _radioBindings = {};        // { "1": "uuid", "red": "uuid", ... } — what user has chosen in this session
let _radioPickerSlot = null;    // currently-picked slot key when modal is open

function renderRadioFavorites(cfg) {
    // Seed _radioBindings from config so unsaved edits survive a re-render.
    _radioBindings = { ...((cfg.radio && cfg.radio.station_buttons) || {}) };

    return `<div class="cfg-card">
        <h2>Radio Favourites</h2>
        <div class="hint" style="margin:0 0 12px">
            Map BeoRemote digit (0–9) and colour buttons to stations.
            The optional alias is what the API matches by name (e.g. "SR P3").
            Colour buttons override their global behaviour (GREEN/YELLOW
            balance, BLUE→Join, RED→HA) only when radio is the active source.
        </div>
        <div id="cfg-rf-list"></div>
    </div>`;
}

async function loadRadioFavourites() {
    try {
        const resp = await fetch(`http://${location.hostname}:8779/favourites`,
            { signal: AbortSignal.timeout(3000) });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        _radioFavourites = Array.isArray(data.favourites) ? data.favourites : [];
        // Trust server's bindings if config didn't have them yet.
        if (!Object.keys(_radioBindings).length && data.station_buttons) {
            _radioBindings = { ...data.station_buttons };
        }
    } catch (e) {
        _radioFavourites = [];
    }
    refreshRadioFavouritesList();
}

// Render 14 fixed rows — one per remote-control slot (digits 1-9, 0,
// then RED/GREEN/YELLOW/BLUE). Each row picks a station from a dropdown
// of current favourites (with "+ Add new…" to open the browse picker),
// edits the station's short_name alias inline, and tests playback.
// Bindings live in `_radioBindings` (slotKey → uuid); aliases live on
// the station record (saved via /favourites/short_name).
function refreshRadioFavouritesList() {
    const list = document.getElementById('cfg-rf-list');
    if (!list) return;

    const stationByUuid = new Map(_radioFavourites.map(f => [f.stationuuid, f]));

    const renderRow = (slot) => {
        const uuid = _radioBindings[slot.key] || '';
        const station = uuid ? stationByUuid.get(uuid) : null;
        const dangling = uuid && !station;
        const alias = station ? (station.short_name || '') : '';

        const labelClass = slot.color
            ? `cfg-rf-slot-label cfg-rf-slot-label-${esc(slot.key)}`
            : `cfg-rf-slot-label`;
        const aliasAttrs = station
            ? `data-uuid="${esc(uuid)}"`
            : `disabled`;
        const testAttrs = (station || dangling) ? '' : 'disabled';

        const stationLabel = station ? station.name
            : (dangling ? `(missing — ${uuid.slice(0, 12)})` : '— none —');
        const stationTextClass = station
            ? 'cfg-rf-slot-station-text'
            : 'cfg-rf-slot-station-text cfg-rf-slot-station-text-empty';

        return `<div class="cfg-rf-slot-row">
            <div class="${labelClass}">${esc(slot.label)}</div>
            <button type="button" class="cfg-rf-slot-station" data-slot="${esc(slot.key)}">
                <span class="${stationTextClass}">${esc(stationLabel)}</span>
                <span class="cfg-rf-slot-station-arrow">▾</span>
            </button>
            <input type="text" class="cfg-rf-slot-alias"
                   ${aliasAttrs}
                   placeholder="alias…"
                   value="${esc(alias)}"
                   maxlength="40">
            <button type="button" class="cfg-rf-slot-test"
                    data-slot="${esc(slot.key)}"
                    title="Test — play this station now"
                    ${testAttrs}>▶</button>
        </div>`;
    };

    list.innerHTML = RADIO_BUTTON_SLOTS.map(renderRow).join('');
}

// Picker state: stack of {path, name, items} so back-navigation has the
// full breadcrumb. Top of stack is the currently rendered level.
let _radioPickerStack = [];
const _radioPickerCache = {};   // path -> {items, name}
const RADIO_URL_PREFIX = () => `http://${location.hostname}:8779`;

// slotKey: button slot to bind, or null to just add to favourites without
// binding (the merged Config UI uses null — bindings are set via the
// dropdown next to each favourite row).
async function openRadioPicker(slotKey) {
    _radioPickerSlot = slotKey || null;
    _radioPickerStack = [];
    document.getElementById('cfg-rf-modal').classList.add('active');
    await navigateRadioPicker('', /*push=*/true);
}

async function navigateRadioPicker(path, push) {
    const list = document.getElementById('cfg-rf-modal-list');
    list.innerHTML = `<div class="cfg-rf-empty-hint" style="padding:24px 16px;text-align:center">Loading…</div>`;
    let data = _radioPickerCache[path];
    if (!data) {
        try {
            const resp = await fetch(`${RADIO_URL_PREFIX()}/browse?path=${encodeURIComponent(path)}`,
                { signal: AbortSignal.timeout(8000) });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            data = await resp.json();
            _radioPickerCache[path] = data;
        } catch (e) {
            list.innerHTML = `<div class="cfg-rf-empty-hint" style="padding:24px 16px;text-align:center;color:#a44">
                Could not reach radio service (${esc(e.message)}).
            </div>`;
            return;
        }
    }
    if (push) _radioPickerStack.push({ path, name: data.name || 'Radio' });
    renderRadioPickerLevel(data);
}

function renderRadioPickerLevel(data) {
    const slot = RADIO_BUTTON_SLOTS.find(s => s.key === _radioPickerSlot);
    const titleEl = document.getElementById('cfg-rf-modal-title');
    const crumb = _radioPickerStack.map(s => s.name).join(' › ');
    const prefix = slot ? `${slot.label} → ` : 'Add favourite → ';
    titleEl.textContent = prefix + crumb;

    const list = document.getElementById('cfg-rf-modal-list');
    const currentUuid = _radioPickerSlot
        ? (_radioBindings[_radioPickerSlot] || '') : '';
    const atRoot = _radioPickerStack.length <= 1;

    const back = !atRoot
        ? `<div class="cfg-rf-modal-clear" data-back="1">
              <span style="font-size:18px;width:32px;text-align:center">‹</span>
              <span>Back</span>
           </div>`
        : '';
    // Only show "Clear binding" when we opened the picker for a specific
    // slot (legacy flow). The merged Config UI clears bindings via the
    // dropdown next to each favourite row, so no slot, no clear option.
    const clear = (atRoot && _radioPickerSlot)
        ? `<div class="cfg-rf-modal-clear" data-uuid="">
              <span style="font-size:18px;width:32px;text-align:center">×</span>
              <span>Clear binding</span>
           </div>`
        : '';
    // Custom stream URL — only at the root level. For stations not in
    // the Radio Browser catalog (corp/private streams, niche feeds).
    const custom = atRoot
        ? `<div class="cfg-rf-modal-clear" data-custom="1">
              <span style="font-size:18px;width:32px;text-align:center">+</span>
              <span>Custom stream URL…</span>
           </div>`
        : '';

    const items = (data.items || []).map(item => {
        if (item.type === 'category') {
            const visual = item.image
                ? `<img src="${esc(item.image)}" alt="">`
                : `<div style="width:32px;height:32px;border-radius:4px;flex-shrink:0;background:${esc(item.color || '#1a1a1a')};display:flex;align-items:center;justify-content:center;font-size:18px;color:#000">▸</div>`;
            const sub = item.count ? `${item.count} stations` : '';
            return `<div class="cfg-rf-modal-item" data-path="${esc(item.path)}">
                ${visual}
                <div class="cfg-rf-modal-text">
                    <div class="cfg-rf-modal-name">${esc(item.name)}</div>
                    <div class="cfg-rf-modal-sub">${esc(sub)}</div>
                </div>
                <span style="color:#444;font-size:18px">›</span>
            </div>`;
        }
        // station
        const sub = [item.country, item.codec && item.bitrate ? `${item.codec} ${item.bitrate}k` : (item.codec || '')]
            .filter(Boolean).join(' · ');
        const sel = item.stationuuid === currentUuid ? ' selected' : '';
        const favUrl = item.image || (item.favicon
            ? `${RADIO_URL_PREFIX()}/favicon?url=${encodeURIComponent(item.favicon)}`
            : '');
        const fav = favUrl
            ? `<img src="${esc(favUrl)}" alt="" onerror="this.style.visibility='hidden'">`
            : `<div style="width:32px;height:32px;background:#1a1a1a;border-radius:4px;flex-shrink:0"></div>`;
        return `<div class="cfg-rf-modal-item${sel}" data-uuid="${esc(item.stationuuid)}"
                     data-name="${esc(item.name)}"
                     data-favicon="${esc(item.favicon || '')}"
                     data-url="${esc(item.url_resolved || item.url || '')}"
                     data-country="${esc(item.country || '')}"
                     data-tags="${esc(item.tags || '')}"
                     data-codec="${esc(item.codec || '')}"
                     data-bitrate="${esc(item.bitrate || 0)}">
            ${fav}
            <div class="cfg-rf-modal-text">
                <div class="cfg-rf-modal-name">${esc(item.name)}</div>
                <div class="cfg-rf-modal-sub">${esc(sub)}</div>
            </div>
        </div>`;
    }).join('');

    list.innerHTML = back + clear + custom + items;
    list.scrollTop = 0;
}

// Inline form within the picker modal: name + URL inputs and Add /
// Cancel buttons. Generates a synthetic stationuuid prefixed with
// "custom-" so it's distinguishable from Radio Browser uuids and
// won't collide with future entries.
function showCustomUrlForm() {
    const titleEl = document.getElementById('cfg-rf-modal-title');
    titleEl.textContent = 'Custom stream URL';
    const list = document.getElementById('cfg-rf-modal-list');
    list.innerHTML = `
      <div class="cfg-rf-custom-form">
        <label>Station name</label>
        <input type="text" id="cfg-rf-custom-name" placeholder="My Station" maxlength="80">
        <label>Stream URL</label>
        <input type="text" id="cfg-rf-custom-url" placeholder="https://example.com/stream.mp3">
        <div class="cfg-rf-custom-err" id="cfg-rf-custom-err"></div>
        <div class="cfg-rf-custom-actions">
          <button type="button" class="btn-subtle" data-custom-cancel="1">Cancel</button>
          <button type="button" class="btn-subtle" data-custom-add="1">Add favourite</button>
        </div>
      </div>`;
    document.getElementById('cfg-rf-custom-name').focus();
}

async function submitCustomUrl() {
    const name = document.getElementById('cfg-rf-custom-name').value.trim();
    const url = document.getElementById('cfg-rf-custom-url').value.trim();
    const err = document.getElementById('cfg-rf-custom-err');
    err.textContent = '';
    if (!name) { err.textContent = 'Name is required.'; return; }
    if (!/^https?:\/\//i.test(url)) {
        err.textContent = 'URL must start with http:// or https://';
        return;
    }
    // Synthetic uuid — namespaced so future migrations can spot custom
    // entries. Random suffix avoids collisions on rapid entry.
    const uuid = `custom-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
    const station = {
        stationuuid: uuid, name, url_resolved: url,
        favicon: '', country: '', tags: 'custom', codec: '', bitrate: 0,
    };
    try {
        const resp = await fetch(`${RADIO_URL_PREFIX()}/command`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command: 'add_favourite', station }),
            signal: AbortSignal.timeout(5000),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    } catch (e) {
        err.textContent = `Save failed: ${e.message}`;
        return;
    }
    _radioFavourites.push(station);
    if (_radioPickerSlot) _radioBindings[_radioPickerSlot] = uuid;
    refreshRadioFavouritesList();
    closeRadioPicker();
}

async function pickRadioStation(itemEl) {
    const uuid = itemEl.dataset.uuid;
    if (!uuid && _radioPickerSlot) {        // "Clear binding" (legacy slot flow)
        delete _radioBindings[_radioPickerSlot];
        refreshRadioFavouritesList();
        closeRadioPicker();
        return;
    }
    if (!uuid) { closeRadioPicker(); return; }
    // Ensure the station is in the favourites list — the radio service
    // resolves bindings via favourites at runtime. If we picked from a
    // non-favourites view, persist the station first.
    const known = _radioFavourites.find(s => s.stationuuid === uuid);
    if (!known) {
        const station = {
            stationuuid: uuid,
            name: itemEl.dataset.name,
            url_resolved: itemEl.dataset.url,
            favicon: itemEl.dataset.favicon,
            country: itemEl.dataset.country,
            tags: itemEl.dataset.tags,
            codec: itemEl.dataset.codec,
            bitrate: parseInt(itemEl.dataset.bitrate) || 0,
        };
        try {
            await fetch(`${RADIO_URL_PREFIX()}/command`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: 'add_favourite', station }),
                signal: AbortSignal.timeout(5000),
            });
        } catch (e) { /* still bind — service will log a warning */ }
        _radioFavourites.push({
            stationuuid: uuid,
            name: station.name,
            favicon: station.favicon,
            country: station.country,
            tags: station.tags,
            codec: station.codec,
            bitrate: station.bitrate,
        });
    }
    if (_radioPickerSlot) _radioBindings[_radioPickerSlot] = uuid;
    refreshRadioFavouritesList();
    closeRadioPicker();
}

function closeRadioPicker() {
    document.getElementById('cfg-rf-modal').classList.remove('active');
    _radioPickerSlot = null;
    _radioPickerStack = [];
}

// ── Radio favourite short_name aliases ──
//
// A short alias per station, used by the radio service's play_by_name to
// match BeoRemote menu labels (e.g. "SR P3") to the longer favourite name
// ("Sveriges Radio - P3"). Stored in the favourites file alongside each
// station, NOT in config.json — saves immediately on input change rather
// than waiting for the global Save button.

const _aliasSaveTimers = new Map();
function scheduleAliasSave(uuid, value, inputEl) {
    if (_aliasSaveTimers.has(uuid)) clearTimeout(_aliasSaveTimers.get(uuid));
    _aliasSaveTimers.set(uuid, setTimeout(async () => {
        _aliasSaveTimers.delete(uuid);
        inputEl.classList.remove('saved', 'error');
        inputEl.classList.add('saving');
        try {
            const resp = await fetch(
                `http://${location.hostname}:8779/favourites/short_name`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stationuuid: uuid, short_name: value }),
                    signal: AbortSignal.timeout(3000),
                });
            inputEl.classList.remove('saving');
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            // Update in-memory cache so picker labels stay in sync
            const fav = _radioFavourites.find(s => s.stationuuid === uuid);
            if (fav) fav.short_name = value;
            inputEl.classList.add('saved');
            setTimeout(() => inputEl.classList.remove('saved'), 1200);
        } catch (e) {
            inputEl.classList.remove('saving');
            inputEl.classList.add('error');
        }
    }, 600));
}

function setupRadioFavoritesListeners() {
    const list = document.getElementById('cfg-rf-list');
    if (list) {
        list.addEventListener('input', e => {
            const inp = e.target.closest('.cfg-rf-slot-alias');
            if (inp && inp.tagName === 'INPUT' && !inp.disabled) {
                scheduleAliasSave(inp.dataset.uuid, inp.value.trim(), inp);
            }
        });
        list.addEventListener('click', e => {
            const stationBtn = e.target.closest('.cfg-rf-slot-station');
            if (stationBtn) {
                openStationPicker(stationBtn.dataset.slot, stationBtn);
                return;
            }
            const test = e.target.closest('.cfg-rf-slot-test');
            if (test && !test.disabled) testPlayBySlot(test.dataset.slot);
        });
    }
    setupStationPickerListeners();

    document.getElementById('cfg-rf-modal-close')?.addEventListener('click', closeRadioPicker);
    document.getElementById('cfg-rf-modal')?.addEventListener('click', e => {
        if (e.target.id === 'cfg-rf-modal') closeRadioPicker();
    });
    document.getElementById('cfg-rf-modal-list')?.addEventListener('click', e => {
        if (e.target.closest('[data-custom-cancel]')) {
            navigateRadioPicker('', /*push=*/false);  // back to root list
            return;
        }
        if (e.target.closest('[data-custom-add]')) {
            submitCustomUrl();
            return;
        }
        if (e.target.closest('[data-custom]')) {
            showCustomUrlForm();
            return;
        }
        const back = e.target.closest('[data-back]');
        if (back) {
            _radioPickerStack.pop();          // current
            const prev = _radioPickerStack.pop(); // parent (re-pushed by navigate)
            navigateRadioPicker(prev ? prev.path : '', /*push=*/true);
            return;
        }
        const cat = e.target.closest('[data-path]');
        if (cat) {
            navigateRadioPicker(cat.dataset.path, /*push=*/true);
            return;
        }
        const item = e.target.closest('[data-uuid]');
        if (item) pickRadioStation(item);
    });
}

// ── Searchable station picker (per-slot popup with filter input) ──
//
// Anchored under the slot's station button. Lists current favourites
// filtered by name + short_name substring match. "— none —" unbinds,
// "+ Add new station…" opens the browse picker (same flow as before).

let _radioStationPickerSlot = null;
let _radioStationPickerActiveIndex = -1;

function openStationPicker(slotKey, anchorBtn) {
    _radioStationPickerSlot = slotKey;
    _radioStationPickerActiveIndex = -1;
    const popup = document.getElementById('cfg-rf-station-popup');
    const rect = anchorBtn.getBoundingClientRect();
    const width = Math.max(rect.width, 280);
    let left = rect.left + window.scrollX;
    if (left + width > window.scrollX + document.documentElement.clientWidth - 12) {
        left = window.scrollX + document.documentElement.clientWidth - 12 - width;
    }
    popup.style.left = `${Math.max(left, window.scrollX + 12)}px`;
    popup.style.top = `${rect.bottom + window.scrollY + 4}px`;
    popup.style.width = `${width}px`;
    popup.classList.add('active');
    const search = document.getElementById('cfg-rf-station-search');
    search.value = '';
    renderStationPickerList('');
    setTimeout(() => search.focus(), 0);
}

function closeStationPicker() {
    document.getElementById('cfg-rf-station-popup').classList.remove('active');
    _radioStationPickerSlot = null;
    _radioStationPickerActiveIndex = -1;
}

function renderStationPickerList(query) {
    const list = document.getElementById('cfg-rf-station-list');
    if (!list) return;
    const q = query.toLowerCase().trim();
    const currentUuid = _radioStationPickerSlot
        ? (_radioBindings[_radioStationPickerSlot] || '') : '';

    const filtered = q
        ? _radioFavourites.filter(f =>
            (f.name || '').toLowerCase().includes(q) ||
            (f.short_name || '').toLowerCase().includes(q))
        : _radioFavourites.slice();

    const rows = [];
    if (!q) {
        rows.push(`<div class="cfg-rf-station-opt cfg-rf-station-opt-special" data-uuid="">
            — none —
        </div>`);
    }
    if (filtered.length === 0 && q) {
        rows.push(`<div class="cfg-rf-station-empty">No favourites match "${esc(query)}"</div>`);
    } else {
        for (const f of filtered) {
            const sel = f.stationuuid === currentUuid ? ' active' : '';
            rows.push(`<div class="cfg-rf-station-opt${sel}" data-uuid="${esc(f.stationuuid)}">
                <span class="cfg-rf-station-opt-name">${esc(f.name)}</span>
                ${f.short_name ? `<span class="cfg-rf-station-opt-alias">${esc(f.short_name)}</span>` : ''}
            </div>`);
        }
    }
    rows.push(`<div class="cfg-rf-station-opt cfg-rf-station-opt-add" data-uuid="__ADD__">
        + Add new station…
    </div>`);
    list.innerHTML = rows.join('');
}

function pickStationForSlot(uuid) {
    const slot = _radioStationPickerSlot;
    closeStationPicker();
    if (!slot) return;
    if (uuid === '__ADD__') {
        openRadioPicker(slot);
        return;
    }
    onSlotStationChange(slot, uuid);
}

function setupStationPickerListeners() {
    const search = document.getElementById('cfg-rf-station-search');
    const list = document.getElementById('cfg-rf-station-list');
    if (!search || !list) return;

    search.addEventListener('input', () => renderStationPickerList(search.value));
    search.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeStationPicker(); return; }
        if (e.key === 'Enter') {
            // Pick first non-special row matching the query
            const first = list.querySelector('.cfg-rf-station-opt:not(.cfg-rf-station-opt-special):not(.cfg-rf-station-opt-add)');
            if (first) pickStationForSlot(first.dataset.uuid);
            e.preventDefault();
        }
    });
    list.addEventListener('click', e => {
        const opt = e.target.closest('.cfg-rf-station-opt');
        if (opt) pickStationForSlot(opt.dataset.uuid);
    });
    // Close on outside click
    document.addEventListener('mousedown', e => {
        const popup = document.getElementById('cfg-rf-station-popup');
        if (!popup.classList.contains('active')) return;
        if (popup.contains(e.target)) return;
        if (e.target.closest('.cfg-rf-slot-station')) return;  // anchor handles toggle
        closeStationPicker();
    });
}

// Test-play the station bound to a slot. Always plays directly by uuid
// (play_station) rather than via digit/play_button — that path depends
// on the binding existing in the radio service's loaded config.json,
// which only happens after Save & Restart. play_station works against
// the in-memory dropdown choice immediately.
async function testPlayBySlot(slotKey) {
    const uuid = _radioBindings[slotKey];
    if (!uuid) return;
    const btn = document.querySelector(
        `.cfg-rf-slot-test[data-slot="${CSS.escape(slotKey)}"]`);
    if (!btn) return;
    btn.classList.remove('error', 'playing');
    btn.disabled = true;
    try {
        const resp = await fetch(`${RADIO_URL_PREFIX()}/command`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command: 'play_station', stationuuid: uuid }),
            signal: AbortSignal.timeout(15000),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json().catch(() => ({}));
        if (data.status && data.status !== 'ok') throw new Error(data.message || 'failed');
        btn.classList.add('playing');
        setTimeout(() => btn.classList.remove('playing'), 2000);
    } catch (e) {
        btn.classList.add('error');
        setTimeout(() => btn.classList.remove('error'), 2000);
    } finally {
        btn.disabled = false;
    }
}

// Slot dropdown changed: bind/unbind. Each station can only sit in one
// slot — reassigning a station to a new slot clears its previous slot.
function onSlotStationChange(slotKey, uuid) {
    if (!uuid) {
        delete _radioBindings[slotKey];
    } else {
        for (const [k, v] of Object.entries(_radioBindings)) {
            if (v === uuid && k !== slotKey) delete _radioBindings[k];
        }
        _radioBindings[slotKey] = uuid;
    }
    refreshRadioFavouritesList();
}

function setupListeners() {
    document.getElementById('cfg-ha-url')?.addEventListener('input', e => {
        const link = document.getElementById('cfg-ha-token-link');
        if (link) link.href = (e.target.value.trim().replace(/\/$/, '') || '') + '/profile';
    });
    document.getElementById('cfg-player-type')?.addEventListener('change', e => {
        const show = ['sonos','bluesound','beoplay','music_assistant'].includes(e.target.value);
        document.getElementById('cfg-player-ip-cond').classList.toggle('show', show);
        document.getElementById('cfg-player-ma-cond')?.classList.toggle('show', e.target.value === 'music_assistant');
        const r = document.getElementById('cfg-player-results');
        if (r) { r.innerHTML = ''; r.classList.remove('show'); }
        updateVolumeOptions();
    });
    document.getElementById('cfg-volume-type')?.addEventListener('change', e => {
        const t = e.target.value;
        const showTone = !TONE_EXCLUDED_TYPES.includes(t);
        const showBalance = !BALANCE_EXCLUDED_TYPES.includes(t);
        document.getElementById('cfg-volume-host-cond')?.classList.toggle('show', VOLUME_HOST_TYPES.includes(t));
        document.getElementById('cfg-tone-cond')?.classList.toggle('show', showTone || showBalance);
        document.querySelectorAll('.cfg-tone-full').forEach(el =>
            el.style.display = showTone ? '' : 'none');
        document.querySelectorAll('.cfg-tone-balance').forEach(el =>
            el.style.display = showBalance ? '' : 'none');
    });
    setupToneListeners();
    document.getElementById('cfg-transport-mode')?.addEventListener('change', e => {
        const show = ['mqtt','both'].includes(e.target.value);
        document.getElementById('cfg-mqtt-cond').classList.toggle('show', show);
    });
    document.getElementById('cfg-ml-role')?.addEventListener('change', e => {
        const r = e.target.value;
        document.getElementById('cfg-ml-provider-cond')?.classList.toggle('show', r === 'provider');
        document.getElementById('cfg-ml-link-cond')?.classList.toggle('show', r === 'link');
    });
    document.querySelectorAll('.cfg-src-toggle').forEach(toggle => {
        const kn = toggle.dataset.key.replace(/ /g,'_').toLowerCase();
        const body = document.getElementById(`cfg-src-${kn}-body`);
        toggle.addEventListener('change', e => { if (body) body.classList.toggle('show', e.target.checked); });
    });
    document.getElementById('cfg-sources-list')?.addEventListener('change', e => {
        if (e.target.classList.contains('cfg-ir-select')) updateIrDropdowns();
    });
    document.getElementById('cfg-save')?.addEventListener('click', saveConfig);
    setupRadioFavoritesListeners();
}

// ── Tone controls (bass / treble / balance / loudness) ──────────────
// Talk to the router directly on port 8770 (it has CORS wide open).
// On input: debounce ~150 ms per axis and POST the change so a slider
// drag feels live.  On load: GET current state to re-sync in case
// another client has changed values since this page was rendered.

const TONE_ROUTER_URL = `http://${location.hostname}:8770/router/tone`;
const _toneThrottle = {};
// Throttle window so BeoLab 5 / PowerLink track the slider live during a
// fast drag. Trailing-debounce was wrong here: while the user keeps
// dragging, every input event resets the timer, so nothing fires until
// they pause — the audio appeared dead during fast motion.
const TONE_THROTTLE_MS = 60;

function setupToneListeners() {
    ['bass', 'treble', 'balance'].forEach(axis => {
        const slider = document.getElementById(`cfg-tone-${axis}`);
        const valEl = document.getElementById(`cfg-tone-${axis}-val`);
        if (!slider) return;
        slider.addEventListener('input', () => {
            const v = parseInt(slider.value, 10);
            if (valEl) valEl.textContent =
                axis === 'balance' ? balanceLabel(v) : (v > 0 ? `+${v}` : `${v}`);
            scheduleToneSend(axis, v);
        });
    });
    const loud = document.getElementById('cfg-tone-loudness');
    if (loud) {
        loud.addEventListener('change', () =>
            scheduleToneSend('loudness', loud.checked));
    }
    refreshToneFromRouter();
}

function scheduleToneSend(axis, value) {
    const state = _toneThrottle[axis] || (_toneThrottle[axis] = {});
    state.value = value;
    if (state.timer) return;
    const now = performance.now();
    const wait = Math.max(0, TONE_THROTTLE_MS - (now - (state.lastSent || 0)));
    state.timer = setTimeout(() => {
        state.timer = null;
        state.lastSent = performance.now();
        sendTone({[axis]: state.value});
    }, wait);
}

async function sendTone(body) {
    const status = document.getElementById('cfg-tone-status');
    try {
        const resp = await fetch(TONE_ROUTER_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
        if (data.supported === false) {
            toneShowStatus('Tone control not available on this output');
            document.getElementById('cfg-tone-cond')?.classList.remove('show');
            return;
        }
        if (status) status.style.display = 'none';
    } catch (e) {
        toneShowStatus(`Tone update failed: ${e.message}`);
    }
}

function toneShowStatus(msg) {
    const status = document.getElementById('cfg-tone-status');
    if (!status) return;
    status.textContent = msg;
    status.style.display = 'block';
}

async function refreshToneFromRouter() {
    try {
        const resp = await fetch(TONE_ROUTER_URL);
        if (!resp.ok) return;
        const data = await resp.json();
        if (data.supported === false) {
            document.getElementById('cfg-tone-cond')?.classList.remove('show');
            return;
        }
        applyToneToUi(data);
    } catch { /* offline or router not up — leave UI defaults */ }
}

function applyToneToUi(data) {
    for (const axis of ['bass', 'treble', 'balance']) {
        if (!Number.isFinite(data[axis])) continue;
        const slider = document.getElementById(`cfg-tone-${axis}`);
        const valEl = document.getElementById(`cfg-tone-${axis}-val`);
        if (slider) slider.value = data[axis];
        if (valEl) valEl.textContent =
            axis === 'balance' ? balanceLabel(data[axis])
                               : (data[axis] > 0 ? `+${data[axis]}` : `${data[axis]}`);
    }
    if (typeof data.loudness === 'boolean') {
        const loud = document.getElementById('cfg-tone-loudness');
        if (loud) loud.checked = data.loudness;
    }
}

function updateVolumeOptions() {
    const playerType = document.getElementById('cfg-player-type')?.value || 'sonos';
    const volSelect = document.getElementById('cfg-volume-type');
    if (!volSelect) return;
    const currentVal = volSelect.value;
    const compatible = VOLUME_TYPES.filter(([,, c]) => c.split(' ').includes(playerType));
    // Prefer the adapter matching the new player type: a stale-but-compatible
    // selection (e.g. beoplay volume kept after switching the player to
    // music_assistant) leaves the wheel bound to the old speaker.
    const pick = compatible.some(([v]) => v === playerType) ? playerType
               : compatible.some(([v]) => v === currentVal) ? currentVal
               : compatible[0]?.[0];
    volSelect.innerHTML = compatible.map(([v, l]) =>
        `<option value="${v}" ${v === pick ? 'selected' : ''}>${l}</option>`
    ).join('');
    // MA volume is a logical 0–100 scale (the hardware ceiling lives in MA
    // itself) — a max inherited from a speaker-hardware adapter (e.g.
    // beoplay's 50) silently caps the wheel at half the range.
    if (pick === 'music_assistant' && currentVal !== 'music_assistant') {
        const maxEl = document.getElementById('cfg-volume-max');
        if (maxEl) maxEl.value = 100;
    }
    // Sync dependent fields (host input, tone/balance visibility)
    volSelect.dispatchEvent(new Event('change'));
}

function updateIrDropdowns() {
    const selects = document.querySelectorAll('.cfg-ir-select');
    const usedBy = {};
    selects.forEach(sel => { if (sel.value) usedBy[sel.value] = sel.dataset.kn; });
    selects.forEach(sel => {
        const current = sel.value, self = sel.dataset.kn;
        let html = '<option value="">— none —</option>';
        BEO4_SOURCES.forEach(s => {
            const takenBy = usedBy[s.value], isSelf = takenBy === self, isTaken = takenBy && !isSelf;
            html += `<option value="${s.value}" ${s.value===current?'selected':''} ${isTaken?'disabled':''}>${s.label}${isTaken?' (used)':''}</option>`;
        });
        sel.innerHTML = html; sel.value = current;
    });
}

async function discoverPlayer(event) {
    const btn = event.currentTarget;
    const playerType = document.getElementById('cfg-player-type')?.value || 'sonos';
    if (playerType === 'music_assistant') {
        // No mDNS discovery for MA — the server address is entered manually
        btn.textContent = 'Enter IP manually';
        setTimeout(() => { btn.textContent = 'Discover'; }, 3000);
        return;
    }
    const endpoint = ['bluesound','beoplay'].includes(playerType) ? '/discover/' + playerType : '/discover/sonos';
    const resultEl = document.getElementById('cfg-player-results');
    btn.textContent = 'Scanning...'; btn.disabled = true;
    resultEl.classList.remove('show');
    try {
        const resp = await fetch(API + endpoint, { signal: AbortSignal.timeout(12000) });
        const devices = await resp.json();
        if (!Array.isArray(devices) || !devices.length) {
            resultEl.innerHTML = '<span class="cfg-discover-empty">No devices found — enter IP manually</span>';
        } else {
            resultEl.innerHTML = devices.map(d =>
                `<div class="cfg-discover-item" onclick="pickPlayer('${esc(d.ip)}','${esc(d.name)}')">
                    <span class="cfg-discover-name">${esc(d.name)}</span>
                    <span class="cfg-discover-ip">${esc(d.ip)}</span>
                </div>`
            ).join('');
        }
        resultEl.classList.add('show');
    } catch(e) {
        resultEl.innerHTML = '<span class="cfg-discover-empty">Scan failed — enter IP manually</span>';
        resultEl.classList.add('show');
    }
    btn.textContent = 'Discover'; btn.disabled = false;
}

function pickPlayer(ip, name) {
    document.getElementById('cfg-player-ip').value = ip;
    const out = document.getElementById('cfg-volume-output');
    if (out && !out.value) out.value = name;
    document.getElementById('cfg-player-results').classList.remove('show');
}

async function discoverHA(event) {
    const btn = event.currentTarget;
    btn.textContent = 'Checking...'; btn.disabled = true;
    const candidates = ['homeassistant.local', 'ha.local', 'hass.local'];
    for (const host of candidates) {
        try {
            const resp = await fetch(`http://${host}:8123/api/`, { signal: AbortSignal.timeout(2500) });
            if ([200, 401, 403].includes(resp.status)) {
                const url = `http://${host}:8123`;
                document.getElementById('cfg-ha-url').value = url;
                const wh = document.getElementById('cfg-ha-webhook');
                if (!wh.value) wh.value = `${url}/api/webhook/beosound5c`;
                const link = document.getElementById('cfg-ha-token-link');
                if (link) link.href = url.replace(/\/$/, '') + '/profile';
                btn.textContent = 'Found ✓'; btn.className = 'btn-subtle ok';
                setTimeout(() => { btn.textContent = 'Discover'; btn.className = 'btn-subtle'; btn.disabled = false; }, 3000);
                return;
            }
        } catch(e) {}
    }
    btn.textContent = 'Not found'; btn.className = 'btn-subtle fail';
    setTimeout(() => { btn.textContent = 'Discover'; btn.className = 'btn-subtle'; btn.disabled = false; }, 3000);
}

async function testPlayerConn(event) {
    const btn = event.target;
    const ip = document.getElementById('cfg-player-ip')?.value?.trim();
    if (!ip) { btn.textContent = 'No IP'; return; }
    btn.textContent = 'Testing...';
    const playerType = document.getElementById('cfg-player-type')?.value || 'sonos';
    const probeUrl = playerType === 'beoplay' ? `http://${ip}:8080/BeoDevice`
                   : playerType === 'bluesound' ? `http://${ip}:11000/Status`
                   : playerType === 'music_assistant' ? `http://${ip}:8095/info`
                   : `http://${ip}:1400/xml/device_description.xml`;
    try {
        await fetch(probeUrl, { signal: AbortSignal.timeout(3000), mode: 'no-cors' });
        btn.textContent = 'Reachable ✓'; btn.className = 'btn-subtle ok';
    } catch(e) {
        btn.textContent = e.name === 'TimeoutError' ? 'Timed out' : 'Unreachable'; btn.className = 'btn-subtle fail';
    }
    setTimeout(() => { btn.textContent = 'Test'; btn.className = 'btn-subtle'; }, 3000);
}

async function testHAConn(event) {
    const btn = event.target;
    const url = document.getElementById('cfg-ha-url')?.value?.trim();
    if (!url) { btn.textContent = 'No URL'; return; }
    const token = document.getElementById('cfg-ha-token')?.value?.trim();
    btn.textContent = 'Testing...';
    try {
        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
        const resp = await fetch(`${url}/api/`, { headers, signal: AbortSignal.timeout(3000) });
        if (resp.status === 200) {
            btn.textContent = token ? 'Auth OK ✓' : 'Reachable ✓'; btn.className = 'btn-subtle ok';
        } else if (resp.status === 401) {
            btn.textContent = 'Bad token'; btn.className = 'btn-subtle fail';
        } else if (resp.status === 403) {
            btn.textContent = 'Reachable ✓'; btn.className = 'btn-subtle ok';
        } else { btn.textContent = 'Error ' + resp.status; btn.className = 'btn-subtle fail'; }
    } catch(e) { btn.textContent = 'Unreachable'; btn.className = 'btn-subtle fail'; }
    setTimeout(() => { btn.textContent = 'Test'; btn.className = 'btn-subtle'; }, 3000);
}

function buildConfig() {
    const cfg = JSON.parse(JSON.stringify(_cfg || {}));
    cfg.device = document.getElementById('cfg-device')?.value || cfg.device;
    const pt = document.getElementById('cfg-player-type')?.value;
    cfg.player = cfg.player || {}; cfg.player.type = pt;
    if (['sonos','bluesound','beoplay','music_assistant'].includes(pt)) { cfg.player.ip = document.getElementById('cfg-player-ip')?.value || ''; }
    else { delete cfg.player.ip; }
    const vt = document.getElementById('cfg-volume-type')?.value;
    cfg.volume = cfg.volume || {}; cfg.volume.type = vt;
    if (VOLUME_HOST_TYPES.includes(vt)) { cfg.volume.host = document.getElementById('cfg-volume-host')?.value || ''; }
    else { delete cfg.volume.host; }
    cfg.volume.output_name = document.getElementById('cfg-volume-output')?.value || '';
    cfg.volume.max = parseInt(document.getElementById('cfg-volume-max')?.value) || 80;
    cfg.volume.step = parseInt(document.getElementById('cfg-volume-step')?.value) || 3;
    // Snapshot the live tone state into the config being saved so the
    // user's sliders don't get reverted by a full-config POST racing
    // masterlink's debounced persist.
    const keepTone = !TONE_EXCLUDED_TYPES.includes(vt);
    const keepBalance = !BALANCE_EXCLUDED_TYPES.includes(vt);
    if (keepTone || keepBalance) {
        cfg.volume.tone = {};
        if (keepTone) {
            const bass   = parseInt(document.getElementById('cfg-tone-bass')?.value);
            const treble = parseInt(document.getElementById('cfg-tone-treble')?.value);
            const loud   = document.getElementById('cfg-tone-loudness')?.checked;
            cfg.volume.tone.bass   = Number.isFinite(bass)   ? bass   : 0;
            cfg.volume.tone.treble = Number.isFinite(treble) ? treble : 0;
            cfg.volume.tone.loudness = !!loud;
        }
        if (keepBalance) {
            const bal = parseInt(document.getElementById('cfg-tone-balance')?.value);
            cfg.volume.tone.balance = Number.isFinite(bal) ? bal : 0;
        }
    } else {
        delete cfg.volume.tone;
    }
    const ssTimeout = parseInt(document.getElementById('cfg-ss-timeout')?.value);
    cfg.screensaver = {
        timeout: Number.isFinite(ssTimeout) && ssTimeout >= 0 ? ssTimeout : 10,
        content: document.getElementById('cfg-ss-content')?.value || 'clock',
    };
    const standbyTimeout = parseInt(document.getElementById('cfg-standby-timeout')?.value);
    cfg.auto_standby = cfg.auto_standby || {};
    if (Number.isFinite(standbyTimeout) && standbyTimeout >= 0) cfg.auto_standby.timeout = standbyTimeout;
    cfg.home_assistant = cfg.home_assistant || {};
    cfg.home_assistant.url = document.getElementById('cfg-ha-url')?.value || '';
    cfg.home_assistant.webhook_url = document.getElementById('cfg-ha-webhook')?.value || '';
    const tm = document.getElementById('cfg-transport-mode')?.value;
    cfg.transport = cfg.transport || {}; cfg.transport.mode = tm;
    if (['mqtt','both'].includes(tm)) {
        cfg.transport.mqtt_broker = document.getElementById('cfg-mqtt-broker')?.value || '';
        const p = parseInt(document.getElementById('cfg-mqtt-port')?.value);
        if (p && p !== 1883) cfg.transport.mqtt_port = p; else delete cfg.transport.mqtt_port;
    } else { delete cfg.transport.mqtt_broker; delete cfg.transport.mqtt_port; }
    const newMenu = {};
    CFG_SOURCE_DEFS.forEach(src => {
        const kn = src.key.replace(/ /g,'_').toLowerCase();
        const toggle = document.getElementById(`cfg-src-${kn}-toggle`);
        const enabled = src.fixed || (toggle && toggle.checked);
        if (!enabled) return;
        if (src.isUrl) {
            const url = document.getElementById(`cfg-src-${kn}-url`)?.value?.trim();
            if (url) newMenu[src.key] = { url };
        } else {
            newMenu[src.key] = CFG_SOURCE_VIEWS[src.key] || kn;
        }
        (src.fields || []).forEach(f => {
            if (f.path[0] === '_menu_url') return;
            const val = document.getElementById(`cfg-src-${kn}-${f.fid}`)?.value?.trim();
            // IR fields: always write (even blank) so "— none —" clears a previous assignment
            if (!f.isIr && !val) return;
            let obj = cfg;
            for (let i = 0; i < f.path.length - 1; i++) { if (!obj[f.path[i]]) obj[f.path[i]] = {}; obj = obj[f.path[i]]; }
            const leaf = f.path[f.path.length - 1];
            if (f.isIr && !val) { delete obj[leaf]; }
            else if (f.numeric) { const n = parseFloat(val); if (Number.isFinite(n)) obj[leaf] = n; }
            else { obj[leaf] = val; }
        });
        (src.checksFields || []).forEach(cf => {
            const vals = Array.from(document.querySelectorAll(`.cfg-checks-${kn}-${cf.fid}:checked`))
                              .map(el => el.value);
            const p = cf.path;
            let obj = cfg;
            for (let i = 0; i < p.length - 1; i++) { if (!obj[p[i]]) obj[p[i]] = {}; obj = obj[p[i]]; }
            obj[p[p.length - 1]] = vals;
        });
        (src.boolFields || []).forEach(f => {
            const on = !!document.getElementById(`cfg-src-${kn}-${f.fid}`)?.checked;
            const p = f.path;
            let obj = cfg;
            for (let i = 0; i < p.length - 1; i++) { if (!obj[p[i]]) obj[p[i]] = {}; obj = obj[p[i]]; }
            obj[p[p.length - 1]] = on;
        });
    });
    // Preserve menu entries this UI doesn't know about (hand-added webpage
    // entries in /etc config etc.) — rebuilding from CFG_SOURCE_DEFS alone
    // silently deleted them on every save (that's how WEATHER once vanished).
    const knownMenuKeys = new Set(CFG_SOURCE_DEFS.map(s => s.key));
    Object.entries(cfg.menu || {}).forEach(([k, v]) => {
        if (!knownMenuKeys.has(k) && !(k in newMenu)) newMenu[k] = v;
    });
    cfg.menu = newMenu;

    const role = document.getElementById('cfg-ml-role')?.value || 'master';
    cfg.masterlink = cfg.masterlink || {};
    cfg.masterlink.role = role;
    cfg.masterlink.ir = {
        audio: !!document.getElementById('cfg-ml-ir-audio')?.checked,
        video: !!document.getElementById('cfg-ml-ir-video')?.checked,
    };
    cfg.remote = cfg.remote || {};
    cfg.remote.handle_all = !!document.getElementById('cfg-remote-handle-all')?.checked;
    cfg.masterlink.provider = {
        nmusic_source: document.getElementById('cfg-ml-nmusic')?.value || '',
        nradio_source: document.getElementById('cfg-ml-nradio')?.value || '',
    };
    cfg.masterlink.link = {
        sources: Array.from(document.querySelectorAll('.cfg-ml-link-src:checked'))
                      .map(el => el.value),
    };

    // Radio button bindings — only persist non-empty entries.
    const radioButtons = {};
    for (const [k, v] of Object.entries(_radioBindings || {})) {
        if (v) radioButtons[k] = v;
    }
    if (Object.keys(radioButtons).length) {
        cfg.radio = cfg.radio || {};
        cfg.radio.station_buttons = radioButtons;
    } else if (cfg.radio) {
        delete cfg.radio.station_buttons;
        if (!Object.keys(cfg.radio).length) delete cfg.radio;
    }

    const _secrets = {};
    const haToken = document.getElementById('cfg-ha-token')?.value?.trim();
    if (haToken) _secrets.ha_token = haToken;
    const mqttUser = document.getElementById('cfg-mqtt-user')?.value?.trim();
    if (mqttUser) _secrets.mqtt_user = mqttUser;
    const mqttPass = document.getElementById('cfg-mqtt-password')?.value?.trim();
    if (mqttPass) _secrets.mqtt_password = mqttPass;
    const massToken = document.getElementById('cfg-mass-token')?.value?.trim();
    if (massToken) _secrets.mass_token = massToken;
    if (Object.keys(_secrets).length) cfg._secrets = _secrets;
    return cfg;
}

async function saveConfig() {
    const cfg = buildConfig();
    const popup = document.getElementById('restart-popup');
    const status = document.getElementById('restart-status');
    popup.classList.add('active');
    status.style.color = '#0af'; status.textContent = 'Saving configuration...';
    try {
        const resp = await fetch(API + '/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(cfg),
        });
        if (resp.ok) {
            status.textContent = 'Restarting services...';
            pollReconnect();
        } else {
            const d = await resp.json().catch(() => ({}));
            status.textContent = d.message || 'Save failed';
            status.style.color = '#a44';
            // The popup has no close button — auto-dismiss so the view
            // isn't blocked behind a dead full-screen overlay.
            setTimeout(() => popup.classList.remove('active'), 4000);
        }
    } catch(e) {
        status.textContent = 'Could not reach device';
        status.style.color = '#a44';
        setTimeout(() => popup.classList.remove('active'), 4000);
    }
}

function pollReconnect() {
    let attempts = 0;
    let sawDown = false;
    const status = document.getElementById('restart-status');
    const poll = async () => {
        try {
            const resp = await fetch(API + '/update/check', { signal: AbortSignal.timeout(2000) });
            if (resp.ok) {
                const data = await resp.json();
                // Config-save restarts services but never sets
                // update_in_progress, so the very first poll would hit the
                // OLD still-running backend and reload mid-restart into a
                // Chromium error page.  Require a down→up transition, or
                // ~20s of stable OKs as the restarted-too-fast fallback.
                if (!data.update_in_progress && (sawDown || attempts >= 10)) {
                    status.style.color = '#4a4'; status.textContent = 'Done — reloading...';
                    setTimeout(() => location.reload(), 1500);
                    return;
                }
            }
        } catch(e) { sawDown = true; if (status) status.textContent = 'Waiting for device...'; }
        attempts++;
        if (attempts < 60) setTimeout(poll, 2000);
        else { status.style.color = '#a44'; status.textContent = 'Taking too long — reload manually'; }
    };
    setTimeout(poll, 2000);
}
